<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>RPG-Dragons wraith</title>
        <link rel="stylesheet"href="style.css">
    </head>
    <body>
        <div id="game">
            <div id="stats">
                <span class="stat">XP:<strong><span id="xpText">0</span></strong></span>
                <span class="stat">Health:<strong><span id="HealthText">100</span></strong></span>
                <span class="stat">Gold:<strong><span id="goldText">100</strong></span></span>
                <span class="stat">Diamond:<strong><span id="DiamondText">5</span></strong></span>
            </div>
            <div id="controls">
                <button id="button1">Go to store</button>
                <button id="button2">Go to Cave</button>
                <button id="button3">Fight a Dragon</button>
            </div>
            <div id="monsterStats">
                <span class="stat">monster Name:<strong><span id="MonsterName"></span></strong></span>
                <span class="stat">health:<strong><span id="Health"></span></strong></span>
            </div>
            <div id="text">Welcome to the world of Dragon wraith.You must defeat the dragon that is preventing people from leaving the town.You are in the town hall at the center,where you want to move next?</div>
        </div>
        <script src="javascript.js"></script>
    </body>
</html>
