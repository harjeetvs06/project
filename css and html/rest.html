<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compact Restaurant</title>
    <style>
        *{margin:0; padding:0; box-sizing:border-box;}
        body{font-family: Arial, sans-serif; background-color: #f8f8f8;}
  
    header{
        background-color: #c0392b;
        color: white;
        padding: 8px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        font-size:12px;
    }
    .logo{font-weight:bold;font-size:16px;}
    nav a{color:white;text-decoration:none;margin-left:8px;}
    nav a:hover{color:cyan;}
    .hero{
        position:relative;
        height:150px;
        margin:8px 10px;
        border-radius:5px;
        overflow:hidden;
    }
    hero img{width:100%;height:100%;object-fit:cover;
    }
    .hero .overlay{
        position:absolute;top:50%;left:50%;
        transform:translate(-50%,-50%);
        text-align:center;color:white;
        background:rgba(0,0,0,0.4);padding:8px 12px;
        border-radius:5px;font-size:14px;
    }
    .hero h1{font-size:16px;margin-bottom:3px;
    }
    .hero p{font-size:12px;margin:0;
    }
    .content{
        display:grid;
        grid-template-columns:2fr 1fr;
        gap:10px;
        max-width:800px;
        margin:auto;
        padding:8px;
    }
    .menu{
        display: grid;
        grid-template-columns:repeat(2,1fr);
        gap:28px;
    }
    .menu-item{
        background:#fff;
        padding:8px;
        text-align:center;
        border-radius:8px;
        font-size:13px;
        transition:transform 0.2s;
    }
    .menu-item img{
        width:100%;
        height:80px;
        object-fit:cover;
        border-radius:28px;
        margin-bottom:50px;
    }
    .menu-item:hover{
        transform:scale(1.05);
    }
    .harjeet{
        display: flex;
        flex-direction: column;
        gap:100px;
    }
    .harjeet{
        background:orangered;
        color:white;
        text-align:center;
        padding:10px;
        border-radius:8px;
        font-size:14px;
    }
    .footer{
        background:black;
        color:black;
        text-align:center;
        padding:8px;
        font-size:10px;
        margin-top:10px;
    }
    @media(max-width:768px){
        .content{grid-template-columns:1fr;}
        .menu{grid-template-columns:1fr 1fr;}
    }
    @media(max-width:480px){
        header{flex-direction:column;text-align:center;}
        nav a {display:block;margin:2px 0;}
        .menu{grid-template-columns:1fr;}
        .menu-item img{height:70px;}
        .hero{height:120px;}
        .hero .overlay{font-size:12px;padding:6px 8px;}
    }
    </style>
</head>
<body>

            <a href="https://justblrworks.pages.dev/">Contact</a>
        </nav>
